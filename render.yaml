services:
  - type: web
    name: xyrachain-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && pip install -r ../ai-module/requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: CORS_ORIGIN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL_NAME
        value: llama-3.3-70b-versatile
      - key: VECTOR_DB_PATH
        value: ./data/processed
      - key: RAW_DATA_PATH
        value: ./data/raw
      - key: PINATA_API_KEY
        sync: false
      - key: PINATA_SECRET_API_KEY
        sync: false
